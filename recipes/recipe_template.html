<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe Template</title>
	<link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="recipe_card_style.css">
</head>
<body>

    <div class="recipe-card">

        <h1 class="recipe-title">Recipe Title Here</h1>
		
		<div class="navigation">
			<a href="../index.html">Home</a> <a href="recipes_index.html">Recipes</a>
		</div>
			
        <div class="image-placeholder">
            <p>Recipe Image Goes Here</p>
            <!-- Replace with:
            <img src="image.jpg" alt="Recipe image">
            -->
        </div>

        <div class="info">
            <p><strong>Serving Size:</strong> 4 servings</p>
        </div>

        <section class="ingredients">
            <h2>Ingredients</h2>
            <ul>
                <li>1 cup ingredient A</li>
                <li>2 tbsp ingredient B</li>
                <li>1 tsp ingredient C</li>
            </ul>
        </section>

        <section class="steps">
            <h2>Steps</h2>
            <ol>
                <li>Preheat oven to 350°F (175°C).</li>
                <li>Mix ingredients in a bowl.</li>
                <li>Bake for 25 minutes.</li>
            </ol>
        </section>

    </div>

</body>
</html>
